<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  padding: 16px;
  background: #f7f7f9;
}

h2 { margin-bottom: 5px; }
h3 { margin: 10px 0; }

label {
  display: block;
  margin-top: 14px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-sizing: border-box;
}

textarea {
  margin-bottom: 12px;
}

button {
  display: block;
  width: 100%;
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

.primary {
  background: #6b21a8;
  color: white;
}

.secondary {
  background: white;
  border: 1px solid #6b21a8;
  color: #6b21a8;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.buttons button {
  width: 100%;
}

.slots {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}

.slot {
  padding: 6px 12px;
  border-radius: 20px;
  background: #e4e4e7;
  cursor: pointer;
}

.slot.selected {
  background: #6b21a8;
  color: white;
}

.type-option {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}

.type-option.selected {
  border: 2px solid #6b21a8;
  background: #f3f0ff;
}

.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>
</head>

<body>

<h3>Step <span id="step-indicator">1</span> of 3</h3>
<h2>New Appointment</h2>

<!-- STEP 1 -->
<div id="step-1">

<label>Customer Name *</label>
<input type="text" id="customer" />

<button class="secondary" onclick="loadProspect()">
  Load Selected Prospect
</button>

<label>Select Specialist *</label>
<select id="specialist">
  <option value="">-- Select Specialist --</option>
  <option>Sandra McGrath</option>
  <option>Shane Lowry</option>
  <option>Rory McIlroy</option>
  <option>Leona Maguire</option>
</select>

<label>Select Date *</label>
<input type="date" id="date" />

<label>Select Time *</label>
<div class="slots" id="time-slots"></div>

</div>

<!-- STEP 2 -->
<div id="step-2" style="display:none;">

<h3>Appointment Type</h3>

<div class="type-option" onclick="selectType(this,'In-person')">
  <strong>In-person</strong><br/>Visit the location
</div>

<div class="type-option" onclick="selectType(this,'Remote')">
  <strong>Remote</strong><br/>Online meeting
</div>

<label>Email *</label>
<input type="email" id="contact-email"/>

<label>Phone *</label>
<input type="text" id="contact-phone"/>

<label>Notes</label>
<textarea id="contact-notes"></textarea>

</div>

<!-- STEP 3 -->
<div id="step-3" style="display:none;">
<h3>Appointment Summary</h3>
<div id="review-summary"></div>
</div>

<div class="buttons">
  <button class="secondary" onclick="previousStep()">Previous</button>
  <button class="primary" onclick="nextStep()">Next</button>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Create appointment?</h3>
    <p>This will create a new appointment and update Excel.</p>
    <button onclick="closeModal()">Cancel</button>
    <button class="primary" onclick="saveAppointment()">Save</button>
  </div>
</div>

<script>

Office.onReady(() => {});

let currentStep = 1;
let selectedTime = null;
let selectedRowIndex = null;

let appointment = {};

const times = ["09:00","09:30","10:00","10:30","11:00","11:30",
               "12:00","12:30","01:00","01:30","02:00","02:30"];

function createSlots() {
  const container = document.getElementById("time-slots");
  times.forEach(time => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = time;
    div.onclick = () => {
      document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
      div.classList.add("selected");
      selectedTime = time;
    };
    container.appendChild(div);
  });
}
createSlots();

async function loadProspect() {
  await Excel.run(async (context) => {
    const selected = context.workbook.getSelectedRange();
    selected.load("rowIndex");
    await context.sync();

    selectedRowIndex = selected.rowIndex;

    const sheet = context.workbook.worksheets.getActiveWorksheet();
    const rowRange = sheet.getRangeByIndexes(selectedRowIndex, 0, 1, 12);
    rowRange.load("values");
    await context.sync();

    const row = rowRange.values[0];

    if (!row[1] || !row[2]) {
      alert("Please select a valid prospect row.");
      return;
    }

    document.getElementById("customer").value = row[1] + " " + row[2];
  });
}

function selectType(el, type) {
  document.querySelectorAll(".type-option").forEach(o => o.classList.remove("selected"));
  el.classList.add("selected");
  appointment.type = type;
}

function nextStep() {

  if (currentStep === 1) {
    appointment.customer = document.getElementById("customer").value;
    appointment.specialist = document.getElementById("specialist").value;
    appointment.date = document.getElementById("date").value;
    appointment.time = selectedTime;
  }

  if (currentStep === 2) {
    appointment.email = document.getElementById("contact-email").value;
    appointment.phone = document.getElementById("contact-phone").value;
    appointment.notes = document.getElementById("contact-notes").value;
  }

  if (currentStep === 3) {
    openModal();
    return;
  }

  document.getElementById("step-" + currentStep).style.display = "none";
  currentStep++;
  document.getElementById("step-indicator").innerText = currentStep;
  document.getElementById("step-" + currentStep).style.display = "block";

  if (currentStep === 3) buildReview();
}

function previousStep() {
  if (currentStep === 1) return;
  document.getElementById("step-" + currentStep).style.display = "none";
  currentStep--;
  document.getElementById("step-indicator").innerText = currentStep;
  document.getElementById("step-" + currentStep).style.display = "block";
}

function buildReview() {
  document.getElementById("review-summary").innerHTML = `
    <strong>Customer:</strong> ${appointment.customer}<br/>
    <strong>Specialist:</strong> ${appointment.specialist}<br/>
    <strong>Date:</strong> ${appointment.date} ${appointment.time}<br/>
    <strong>Type:</strong> ${appointment.type}<br/>
    <strong>Email:</strong> ${appointment.email}<br/>
    <strong>Phone:</strong> ${appointment.phone}
  `;
}

function openModal() {
  document.getElementById("confirmModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("confirmModal").style.display = "none";
}

async function saveAppointment() {

  if (selectedRowIndex === null) {
    alert("Please load a prospect first.");
    return;
  }

  await Excel.run(async (context) => {
    const sheet = context.workbook.worksheets.getActiveWorksheet();

    // Column J (index 9)
    const statusCell = sheet.getRangeByIndexes(selectedRowIndex, 9, 1, 1);
    statusCell.values = [["Appointment Scheduled"]];

    // Column L (index 11)
    const today = new Date().toISOString().split("T")[0];
    const contactCell = sheet.getRangeByIndexes(selectedRowIndex, 11, 1, 1);
    contactCell.values = [[today]];

    await context.sync();
  });

  closeModal();
  alert("Appointment Created and Excel Updated ✔");
}

</script>

</body>
</html>
