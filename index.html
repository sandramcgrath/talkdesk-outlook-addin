<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  padding: 16px;
  background: #f7f7f9;
}

h2 {
  margin-bottom: 10px;
}

.section {
  margin-bottom: 20px;
}

input[type="text"],
input[type="date"] {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.time-group {
  margin-top: 10px;
}

.time-label {
  font-weight: 600;
  margin: 10px 0 5px;
}

.slots {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.slot {
  padding: 6px 12px;
  border-radius: 20px;
  background: #e4e4e7;
  cursor: pointer;
  font-size: 14px;
}

.slot:hover {
  background: #d4d4d8;
}

.slot.selected {
  background: #6b21a8;
  color: white;
}

.summary {
  background: #ececf1;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
}

.buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

button {
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #6b21a8;
  color: white;
}

.secondary {
  background: white;
  border: 1px solid #6b21a8;
  color: #6b21a8;
}
</style>
</head>

<body>

<h2>New Appointment</h2>

<div class="section">
  <button onclick="loadProspect()">Load Selected Prospect</button>
</div>

<div class="section">
  <label>Customer Name *</label>
  <input type="text" id="customer" />
</div>

<div class="section">
  <label>Select Specialist *</label>
  <select id="specialist" onchange="updateSummary()" style="width:100%; padding:8px; border-radius:6px;">
    <option value="">-- Select Specialist --</option>
    <option>Sandra M</option>
    <option>David R</option>
    <option>Priya K</option>
    <option>James L</option>
  </select>
</div>

<div class="section">
  <label>Select date *</label>
  <input type="date" id="date" />
</div>

<div class="section">
  <div class="time-group">
    <div class="time-label">AM</div>
    <div class="slots" id="am-slots"></div>
  </div>

  <div class="time-group">
    <div class="time-label">PM</div>
    <div class="slots" id="pm-slots"></div>
  </div>
</div>

<div class="section summary" id="summary" style="display:none;"></div>

<div class="buttons">
  <button class="secondary">Previous</button>
  <button class="primary" onclick="schedule()">Next</button>
</div>

<script>
const amTimes = ["09:00","09:30","10:00","10:30","11:00","11:30"];
const pmTimes = ["12:00","12:30","01:00","01:30","02:00","02:30","03:00","03:30","04:00","04:30"];

let selectedTime = null;

function createSlots(times, containerId) {
  const container = document.getElementById(containerId);
  times.forEach(time => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerText = time;
    div.onclick = () => selectTime(div, time);
    container.appendChild(div);
  });
}

function selectTime(element, time) {
  document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
  element.classList.add("selected");
  selectedTime = time;
  updateSummary();
}

async function loadProspect() {
  await Excel.run(async (context) => {
    const range = context.workbook.getSelectedRange();
    range.load("values");
    await context.sync();

    const row = range.values[0];

    // Assuming column B = First Name, C = Last Name
    const firstName = row[1];
    const lastName = row[2];

    document.getElementById("customer").value = firstName + " " + lastName;
    updateSummary();
  });
}

function updateSummary() {
  const customer = document.getElementById("customer").value;
  const date = document.getElementById("date").value;
  const specialist = document.getElementById("specialist").value;

  if (!customer || !date || !selectedTime || !specialist) return;

  const summary = document.getElementById("summary");
  summary.style.display = "block";
  summary.innerHTML = `
    <strong>Appointment time</strong><br/>
    ${date} at ${selectedTime} (30 min)<br/>
    Specialist: ${specialist}<br/>
    Student: ${customer}
  `;
}

function schedule() {
  updateSummary();
  alert("Mock appointment scheduled ✔");
}

document.getElementById("customer").addEventListener("input", updateSummary);
document.getElementById("date").addEventListener("change", updateSummary);

createSlots(amTimes, "am-slots");
createSlots(pmTimes, "pm-slots");

Office.onReady(() => {});
</script>

</body>
</html>
